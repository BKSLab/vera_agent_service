volumes:
  phoenix_data:

networks:
  # Общая сеть для сквозной интеграции трёх сервисов (MCP_SERVICE_PLAN.md
  # в vera_mcp_service, Этап 8). Создаётся один раз вручную:
  # `docker network create vera_network` — не управляется этим (или любым
  # другим) отдельным docker-compose.yml.
  vera_network:
    external: true

services:
  phoenix:
    container_name: vera_agent_phoenix
    # Локальный Phoenix для разработки (Этап 9). С Этапа 8 плана
    # vera_mcp_service (раздел "Этап 8.3") — единственный общий инстанс
    # Phoenix на все три сервиса, не только для agent_service: и
    # vera_mcp_service, и (в перспективе) vera_rag_service экспортируют
    # трейсы сюда же через `vera_network`, чтобы получить единое дерево
    # трейса на сквозной запрос (AGENT_VERA_ARCHITECTURE.md, раздел
    # Observability, требует именно этого). Не публичный порт в проде —
    # см. README RAG Service, аналогичное решение по self-hosted
    # observability-сервисам.
    image: arizephoenix/phoenix:version-17.21.0
    restart: always
    volumes:
      - phoenix_data:/mnt/data
    environment:
      PHOENIX_WORKING_DIR: /mnt/data
    ports:
      - "6006:6006"  # UI + OTLP/HTTP (см. PHOENIX_OTLP_ENDPOINT в .env.example)
      - "4317:4317"  # OTLP/gRPC — не используется этим сервисом (HTTP-экспортёр), порт на будущее
    networks:
      - default
      - vera_network

  agent_service:
    container_name: vera_agent_service
    build: .
    env_file: .env
    # RabbitMQ и Redis больше не поднимаются в этом compose — общие
    # брокер/кеш для всех проектов живут в отдельных репозиториях
    # rabbitmq_service_prod / redis_service_prod (см. их README.md).
    # RABBITMQ_HOST/REDIS_HOST здесь НЕ переопределяются — значения
    # берутся из .env (host.docker.internal для локальной разработки на
    # этом же хосте, реальный адрес сервера в проде). extra_hosts ниже
    # нужен, чтобы host.docker.internal резолвился и на Linux-хосте (на
    # Docker Desktop он и так работает нативно).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PHOENIX_OTLP_ENDPOINT: http://phoenix:6006/v1/traces
      # Резолвится по имени контейнера в общей сети (`vera_network`), не
      # `localhost`/`/mcp/sse` из `.env` (тот верен для локальной разработки
      # одного репозитория, транспорт там же обновлён на streamable-http,
      # раздел 0.2 плана MCP-сервиса).
      MCP_SERVER_URL: http://vera_mcp_service:8000/mcp
    restart: on-failure
    command: bash entrypoint.sh
    # Порт хоста отличается от vera_rag_service (8000), чтобы оба сервиса
    # могли работать локально одновременно без конфликта портов.
    ports:
      - "8010:8000"
    deploy:
      resources:
        limits:
          memory: 1GB
    networks:
      - default
      - vera_network
