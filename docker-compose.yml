volumes:
  rabbitmq_data:
  redis_data:
  phoenix_data:

networks:
  # Общая сеть для сквозной интеграции трёх сервисов (MCP_SERVICE_PLAN.md
  # в vera_mcp_service, Этап 8). Создаётся один раз вручную:
  # `docker network create vera_network` — не управляется этим (или любым
  # другим) отдельным docker-compose.yml.
  vera_network:
    external: true

services:
  rabbitmq:
    container_name: vera_agent_rabbitmq
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    env_file: .env
    restart: always
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"  # management UI — http://localhost:15672

  redis:
    container_name: vera_agent_redis
    # redis-stack-server, не обычный redis — Этап 5 (langgraph-checkpoint-redis)
    # использует RediSearch-индексы (команда FT._LIST и т.п.) для чекпоинтов,
    # которых нет в ванильном Redis. Найдено эмпирически при реализации Этапа 5.
    image: redis/redis-stack-server:7.4.0-v6
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          # Только checkpoint'ы диалогов с TTL (AGENT_SERVICE_PLAN.md, раздел 0.1) —
          # не полноценное хранилище, небольшой лимит достаточен на старте.
          memory: 256M

  phoenix:
    container_name: vera_agent_phoenix
    # Локальный Phoenix для разработки (Этап 9). С Этапа 8 плана
    # vera_mcp_service (раздел "Этап 8.3") — единственный общий инстанс
    # Phoenix на все три сервиса, не только для agent_service: и
    # vera_mcp_service, и (в перспективе) vera_rag_service экспортируют
    # трейсы сюда же через `vera_network`, чтобы получить единое дерево
    # трейса на сквозной запрос (AGENT_VERA_ARCHITECTURE.md, раздел
    # Observability, требует именно этого). Не публичный порт в проде —
    # см. README RAG Service, аналогичное решение по self-hosted
    # observability-сервисам.
    image: arizephoenix/phoenix:version-17.21.0
    restart: always
    volumes:
      - phoenix_data:/mnt/data
    environment:
      PHOENIX_WORKING_DIR: /mnt/data
    ports:
      - "6006:6006"  # UI + OTLP/HTTP (см. PHOENIX_OTLP_ENDPOINT в .env.example)
      - "4317:4317"  # OTLP/gRPC — не используется этим сервисом (HTTP-экспортёр), порт на будущее
    networks:
      - default
      - vera_network

  agent_service:
    container_name: vera_agent_service
    build: .
    env_file: .env
    # Находка Этапа 11: .env содержит RABBITMQ_HOST/REDIS_HOST=localhost —
    # верно для локальной разработки на хосте (тесты/ручной запуск подключаются
    # к портам, опубликованным наружу), но НЕ для этого контейнера — внутри
    # docker-сети "localhost" означает сам контейнер agent_service, а не
    # соседние rabbitmq/redis. environment ниже переопределяет env_file
    # (Compose отдаёт приоритет environment) именами сервисов Compose.
    environment:
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      PHOENIX_OTLP_ENDPOINT: http://phoenix:6006/v1/traces
      # Резолвится по имени контейнера в общей сети (`vera_network`), не
      # `localhost`/`/mcp/sse` из `.env` (тот верен для локальной разработки
      # одного репозитория, транспорт там же обновлён на streamable-http,
      # раздел 0.2 плана MCP-сервиса) — тот же паттерн, что и RABBITMQ_HOST/REDIS_HOST выше.
      MCP_SERVER_URL: http://vera_mcp_service:8000/mcp
    restart: on-failure
    command: bash entrypoint.sh
    # Порт хоста отличается от vera_rag_service (8000), чтобы оба сервиса
    # могли работать локально одновременно без конфликта портов.
    ports:
      - "8010:8000"
    deploy:
      resources:
        limits:
          memory: 1GB
    depends_on:
      - rabbitmq
      - redis
    networks:
      - default
      - vera_network
