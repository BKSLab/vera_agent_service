[loggers]
keys=root,vera_agent_service,httpx,httpcore,aio_pika

[handlers]
keys=consoleHandler

[formatters]
keys=simpleFormatter

[logger_root]
level=INFO
handlers=consoleHandler

[logger_vera_agent_service]
level=INFO
handlers=consoleHandler
qualname=vera_agent_service
propagate=0

[logger_httpx]
level=WARNING
handlers=consoleHandler
qualname=httpx
propagate=0

[logger_httpcore]
level=WARNING
handlers=consoleHandler
qualname=httpcore
propagate=0

[logger_aio_pika]
level=WARNING
handlers=consoleHandler
qualname=aio_pika
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=simpleFormatter

[formatter_simpleFormatter]
format=%(asctime)s [%(levelname)s] %(name)s %(funcName)s %(message)s
